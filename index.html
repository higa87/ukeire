<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>材料受け入れ検査シート</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* A4縦に最適化した印刷用スタイル */
    #pdf-content {
      background-color: white;
      padding: 30px;
      width: 100%;
      max-width: 700px; /* A4の比率に合わせて少しスリムに */
      margin: 0 auto;
      box-sizing: border-box;
    }
    /* 写真がはみ出さないように厳密に枠を固定 */
    .photo-frame {
      width: 100%;
      height: 350px; /* A4に収まる適切な高さ */
      border: 2px dashed #cbd5e1;
      background-color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* 枠外へのはみ出しを強制カット */
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 縦横比を維持したまま枠内に収める */
    }
  </style>
</head>
<body class="bg-gray-100 p-4">

  <div class="max-w-2xl mx-auto bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
    <h1 class="block text-gray-700 text-xl font-bold mb-6 text-center" data-html2canvas-ignore="true">材料受け入れ検査 入力フォーム</h1>

    <div id="pdf-content">
      <h2 class="text-2xl font-bold text-center mb-8 border-b-2 border-gray-800 pb-2">材料受け入れ検査シート</h2>
      
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="propertyName">
          物件名
        </label>
        <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="propertyName" type="text" placeholder="例：〇〇ビル改修工事">
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2">検査項目 (確認済みにチェック)</label>
        <div class="flex flex-col space-y-2 border rounded p-4 bg-gray-50">
          <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600" id="chk-qty"><span class="ml-2">① 数量</span></label>
          <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600" id="chk-size"><span class="ml-2">② サイズ</span></label>
          <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600" id="chk-material"><span class="ml-2">③ 材質</span></label>
          <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600" id="chk-appearance"><span class="ml-2">④ 外観</span></label>
          <label class="inline-flex items-center"><input type="checkbox" class="form-checkbox h-5 w-5 text-blue-600" id="chk-ident"><span class="ml-2">⑤ 識別</span></label>
        </div>
      </div>

      <div class="mb-4" data-html2canvas-ignore="true">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="photo">
          写真添付 (タップして撮影/選択)
        </label>
        <input class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none" id="photo" type="file" accept="image/*">
      </div>

      <div class="mb-2">
        <p class="block text-gray-700 text-sm font-bold mb-2">添付写真:</p>
        <div id="preview-container" class="photo-frame">
          <span class="text-gray-400">画像がありません</span>
        </div>
      </div>
    </div>
    <div class="flex items-center justify-between mt-6" data-html2canvas-ignore="true">
      <button onclick="generatePDFAndEmail()" id="submit-btn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded w-full focus:outline-none focus:shadow-outline">
        PDFを出力して自動保存・送信する
      </button>
    </div>
  </div>

  <script>
    // 【重要】ご自身のGASウェブアプリURLをここに貼り付けてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxvMVO6S1f78_oeQcU8Iey39VoUTW1hREpizSxqgL_gbx3zCCYjVnuLm5ogos5k6ZY/exec";

    // 写真プレビュー処理
    document.getElementById('photo').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const container = document.getElementById('preview-container');
          container.innerHTML = `<img src="${e.target.result}" alt="検査写真">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // PDF生成・送信処理
    function generatePDFAndEmail() {
      const propertyName = document.getElementById('propertyName').value || "物件名未入力";
      const element = document.getElementById('pdf-content');
      const btn = document.getElementById('submit-btn');
      
      btn.textContent = "送信処理中（しばらくお待ちください）...";
      btn.disabled = true;
      btn.classList.remove('bg-blue-500', 'hover:bg-blue-700');
      btn.classList.add('bg-gray-400');

      // A4縦に綺麗に収めるための余白とスケール調整
      const opt = {
        margin:       [15, 15, 15, 15], // 上下左右にしっかり余白を取る
        filename:     `${propertyName}_材料受け入れ検査シート.pdf`,
        image:        { type: 'jpeg', quality: 0.95 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(element).outputPdf('datauristring').then(function(pdfBase64) {
        const payload = {
          propertyName: propertyName,
          pdfBase64: pdfBase64
        };

        fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
          if(data.status === "success") {
            alert("Googleドライブへの保存と、miya@miyamasa.co.jp へのメール送信が完了しました！");
          } else {
            alert("GAS側でエラーが発生しました: " + data.message);
          }
          resetButton(btn);
        })
        .catch(error => {
          alert("通信エラーが発生しました。");
          resetButton(btn);
        });
      });
    }

    function resetButton(btn) {
      btn.textContent = "PDFを出力して自動保存・送信する";
      btn.disabled = false;
      btn.classList.remove('bg-gray-400');
      btn.classList.add('bg-blue-500', 'hover:bg-blue-700');
    }
  </script>
</body>
</html>
